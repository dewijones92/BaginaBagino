# Location block for the Bagino Bagina backend, to be included inside
# the existing nginx_dewi server block (the one in default.conf).
#
# Path-mapping: public traffic to /bagina/* is proxied to bagina-server:3001
# with the /bagina prefix preserved. This matches BASE_PATH=/bagina in the
# server, so socket.io registers at /bagina/socket.io/.

location /bagina/ {
    # Trailing slash on proxy_pass strips the /bagina/ prefix before forwarding.
    # The server is mount-point agnostic and listens at root paths.
    proxy_pass http://bagina-server:3001/;
    proxy_http_version 1.1;
    proxy_set_header Host                $http_host;
    proxy_set_header X-Real-IP           $remote_addr;
    proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto   $scheme;

    # WebSocket upgrade (required for socket.io)
    proxy_set_header Upgrade  $http_upgrade;
    proxy_set_header Connection $http_connection;

    # Real-time game traffic — disable buffering and set generous timeouts.
    proxy_buffering off;
    proxy_read_timeout 24h;
    proxy_send_timeout 24h;
}
