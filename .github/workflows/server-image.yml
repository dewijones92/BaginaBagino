name: Server image

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'packages/schema/**'
      - '.github/workflows/server-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build + push ARM64 server image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/bagina-server:latest
            ghcr.io/${{ github.repository_owner }}/bagina-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
