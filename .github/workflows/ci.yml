name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-test-ts:
    name: TS lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r run lint
      - run: pnpm -r run test

  flutter-test:
    name: Flutter analyze + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: pnpm install --frozen-lockfile
      - run: pnpm gen
      - working-directory: client
        run: flutter pub get
      - working-directory: client
        run: flutter analyze
      - working-directory: client
        run: flutter test
