name: APK release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build + release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: pnpm install --frozen-lockfile
      - run: pnpm gen
      - run: pnpm -r run test

      - working-directory: client
        run: flutter pub get
      - working-directory: client
        run: flutter analyze
      - working-directory: client
        run: flutter test
      - name: Build APK (split-per-abi)
        working-directory: client
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=SERVER_HOST=333133333.xyz \
            --dart-define=SERVER_PATH=/bagina \
            --dart-define=SERVER_TLS=true

      - name: Compute version tag
        id: tag
        run: echo "tag=v$(date -u +%Y.%m.%d)-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Bagino Bagina ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            client/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            client/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            client/build/app/outputs/flutter-apk/app-x86_64-release.apk
