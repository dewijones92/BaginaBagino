name: bagina
description: "Bagino Bagina — cute, cozy, bouncy multiplayer board game."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State + routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # Networking
  socket_io_client: ^3.0.2

  # Animation + visuals
  flutter_animate: ^4.5.2
  lottie: ^3.3.1
  flutter_svg: ^2.0.16

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/lottie/
    - assets/svg/
