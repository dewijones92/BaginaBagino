  <!-- Mouth -->
  <path d="M 60 70 L 60 76 M 60 76 Q 56 78 52 76 M 60 76 Q 64 78 68 76" fill="none" stroke="#3A1F2A" stroke-width="2.5" stroke-linecap="round"/>
