<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Brave lion face. Goofy not scary. -->
  <!-- Mane -->
  <g fill="#D88243" stroke="#3A1F2A" stroke-width="3">
    <circle cx="22" cy="48" r="11"/>
    <circle cx="22" cy="72" r="11"/>
    <circle cx="98" cy="48" r="11"/>
    <circle cx="98" cy="72" r="11"/>
    <circle cx="32" cy="32" r="10"/>
    <circle cx="60" cy="22" r="11"/>
    <circle cx="88" cy="32" r="10"/>
    <circle cx="40" cy="96" r="10"/>
    <circle cx="80" cy="96" r="10"/>
  </g>
  <!-- Face -->
  <circle cx="60" cy="60" r="30" fill="#FFC684" stroke="#3A1F2A" stroke-width="4"/>
